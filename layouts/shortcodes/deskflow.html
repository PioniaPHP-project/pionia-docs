{{- $chapter := .Get "chapter" | default "" -}}
<div class="deskflow-banner callout callout-note d-flex flex-row my-4 pt-3 pe-3 pb-2 ps-3">
  <div class="callout-content">
    <div class="callout-title">In DeskFlow…</div>
    <div class="callout-body">
      {{ .Inner | markdownify }}
      {{- with $chapter -}}
      <p class="mb-0 mt-2"><small>Continue from <a href="/documentation/getting-started/tutorial-part-1/">Tutorial Part 1</a> if you have not built DeskFlow yet.</small></p>
      {{- end -}}
    </div>
  </div>
</div>

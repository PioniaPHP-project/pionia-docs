<script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
{{ $mermaid := resources.Get "js/mermaid-init.js" -}}
{{ if $mermaid -}}
  {{ $mermaid = $mermaid | resources.Minify | resources.Fingerprint "sha256" -}}
  <script type="module" src="{{ $mermaid.RelPermalink }}" integrity="{{ $mermaid.Data.Integrity }}" crossorigin="anonymous"></script>
{{ end -}}
